<!DOCTYPE html>
<html>
<head>
    <title>Advanced Bird Game+</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: skyblue;
            text-align: center;
        }
        canvas {
            display: block;
            margin: auto;
            background: #70c5ce;
        }
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>🐦 Bird Game</h1>
    <div id="levelButtons"></div>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<button id="restartBtn" style="display:none;">Restart</button>

<audio id="flapSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="hitSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let flapSound = document.getElementById("flapSound");
let hitSound = document.getElementById("hitSound");

let menu = document.getElementById("menu");
let levelButtonsDiv = document.getElementById("levelButtons");
let restartBtn = document.getElementById("restartBtn");

// Bird
let bird;
let pipes;
let frame;
let score;
let gameRunning = false;

// Level settings
let currentLevel = 1;
let speed = 2;
let gap = 150;

// Unlock system
let unlockedLevel = localStorage.getItem("unlockedLevel") || 1;

// Create level buttons
function createLevelButtons() {
    levelButtonsDiv.innerHTML = "";
    for (let i = 1; i <= 4; i++) {
        let btn = document.createElement("button");
        btn.innerText = "Level " + i;

        if (i > unlockedLevel) {
            btn.disabled = true;
            btn.innerText += " 🔒";
        }

        btn.onclick = () => startGame(i);
        levelButtonsDiv.appendChild(btn);
    }
}

createLevelButtons();

// Start game
function startGame(level) {
    currentLevel = level;

    // Level difficulty
    if (level == 1) { speed = 2; gap = 150; }
    if (level == 2) { speed = 3; gap = 130; }
    if (level == 3) { speed = 4; gap = 110; }
    if (level == 4) { speed = 5; gap = 90; }

    bird = {
        x: 80,
        y: 200,
        width: 30,
        height: 30,
        gravity: 0.6,
        lift: -10,
        velocity: 0
    };

    pipes = [];
    frame = 0;
    score = 0;
    gameRunning = true;

    menu.style.display = "none";
    restartBtn.style.display = "none";

    draw();
}

// Controls
document.addEventListener("keydown", flap);
document.addEventListener("touchstart", flap);

function flap() {
    if (!gameRunning) return;
    bird.velocity = bird.lift;
    flapSound.currentTime = 0;
    flapSound.play();
}

// Game loop
function draw() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    ctx.fillStyle = "yellow";
    ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

    // Pipes
    if (frame % 90 === 0) {
        let topHeight = Math.random() * 300;
        pipes.push({
            x: canvas.width,
            top: topHeight,
            bottom: topHeight + gap,
            passed: false
        });
    }

    ctx.fillStyle = "green";

    for (let p of pipes) {
        ctx.fillRect(p.x, 0, 60, p.top);
        ctx.fillRect(p.x, p.bottom, 60, canvas.height);

        p.x -= speed;

        // Collision
        if (
            bird.x < p.x + 60 &&
            bird.x + bird.width > p.x &&
            (bird.y < p.top || bird.y + bird.height > p.bottom)
        ) {
            gameOver();
        }

        // Score
        if (!p.passed && p.x + 60 < bird.x) {
            score++;
            p.passed = true;
        }
    }

    // Ground
    if (bird.y + bird.height > canvas.height || bird.y < 0) {
        gameOver();
    }

    ctx.fillStyle = "black";
    ctx.fillText("Score: " + score, 10, 20);
    ctx.fillText("Level: " + currentLevel, 10, 40);

    frame++;
    requestAnimationFrame(draw);
}

// Game Over
function gameOver() {
    gameRunning = false;
    hitSound.play();

    // Unlock next level
    if (currentLevel == unlockedLevel && unlockedLevel < 4) {
        unlockedLevel++;
        localStorage.setItem("unlockedLevel", unlockedLevel);
    }

    createLevelButtons();

    restartBtn.style.display = "block";
    menu.style.display = "block";
}

// Restart button
restartBtn.onclick = () => {
    startGame(currentLevel);
};
</script>

</body>
</html>
