<!DOCTYPE html>
<html>
<head>
<title>Bird Game ULTRA PRO</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:skyblue;
    text-align:center;
    font-family:Arial;
}

canvas {
    display:block;
    margin:auto;
    background:#70c5ce;
}

#menu, #shop {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    color:white;
}

button {
    padding:10px 20px;
    margin:10px;
    font-size:16px;
}

#topUI {
    position:absolute;
    top:10px;
    right:10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <h1>🐦 Bird Game</h1>
    <h3 id="coinText"></h3>
    <h3 id="highScoreText"></h3>
    <div id="levelButtons"></div>
    <button onclick="openShop()">🛒 Shop</button>
</div>

<!-- SHOP -->
<div id="shop" style="display:none;">
    <h1>🛒 Shop</h1>
    <div id="shopItems"></div>
    <button onclick="closeShop()">⬅ Back</button>
</div>

<div id="topUI">
    <button onclick="goHome()">🏠 Home</button>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<button id="restartBtn" style="display:none;">Restart</button>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let menu = document.getElementById("menu");
let shopDiv = document.getElementById("shop");
let levelButtonsDiv = document.getElementById("levelButtons");
let restartBtn = document.getElementById("restartBtn");
let coinText = document.getElementById("coinText");
let highScoreText = document.getElementById("highScoreText");

let bird, pipes, coinsArr;
let frame, score;
let gameRunning = false;

let currentLevel = 1;
let speed = 2;
let gap = 150;

let levelTarget = 10;

let coins = parseInt(localStorage.getItem("coins")) || 0;
let selectedSkin = localStorage.getItem("skin") || "yellow";
let unlockedLevel = parseInt(localStorage.getItem("unlockedLevel")) || 1;
let highScore = parseInt(localStorage.getItem("highScore")) || 0;

let skins = [
    {name:"yellow", price:0},
    {name:"red", price:50},
    {name:"green", price:100},
    {name:"blue", price:150}
];

// UI UPDATE
function updateUI(){
    coinText.innerText = "Coins: " + coins;
    highScoreText.innerText = "High Score: " + highScore;
}
updateUI();

// LEVEL BUTTONS
function createLevelButtons(){
    levelButtonsDiv.innerHTML = "";

    for(let i=1;i<=100;i++){
        let btn = document.createElement("button");

        if(i <= unlockedLevel){
            btn.innerText = "Level " + i;
            btn.onclick = () => startGame(i);
        } else {
            btn.innerText = "Level " + i + " 🔒";
            btn.disabled = true;
        }

        levelButtonsDiv.appendChild(btn);
    }
}
createLevelButtons();

// SHOP
function openShop(){
    menu.style.display="none";
    shopDiv.style.display="block";
    renderShop();
}

function closeShop(){
    shopDiv.style.display="none";
    menu.style.display="block";
}

function renderShop(){
    let shopItems = document.getElementById("shopItems");
    shopItems.innerHTML="";

    skins.forEach(s=>{
        let btn = document.createElement("button");

        if(selectedSkin==s.name){
            btn.innerText = s.name + " ✅";
        }
        else if(coins >= s.price){
            btn.innerText = s.name + " - " + s.price;
            btn.onclick = ()=>{
                coins -= s.price;
                selectedSkin = s.name;
                saveData();
                renderShop();
            }
        }
        else{
            btn.innerText = s.name + " 🔒 ("+s.price+")";
            btn.disabled = true;
        }

        shopItems.appendChild(btn);
    });
}

// SAVE
function saveData(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("skin", selectedSkin);
    localStorage.setItem("unlockedLevel", unlockedLevel);
    localStorage.setItem("highScore", highScore);
    updateUI();
}

// START GAME
function startGame(level){

    currentLevel = level;

    speed = 2 + level * 0.2;
    gap = 150 - level * 0.5;
    if(gap < 80) gap = 80;

    bird = {
        x:80,y:200,width:30,height:30,
        gravity:0.6,lift:-10,velocity:0
    };

    pipes=[];
    coinsArr=[];
    frame=0;
    score=0;
    gameRunning=true;

    menu.style.display="none";
    restartBtn.style.display="none";

    draw();
}

// CONTROLS
document.addEventListener("keydown", flap);
document.addEventListener("touchstart", flap);

function flap(){
    if(!gameRunning) return;
    bird.velocity = bird.lift;
}

// LOOP
function draw(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    bird.velocity+=bird.gravity;
    bird.y+=bird.velocity;

    ctx.fillStyle = selectedSkin;
    ctx.fillRect(bird.x,bird.y,bird.width,bird.height);

    if(frame%90===0){
        let top=Math.random()*300;
        pipes.push({
            x:canvas.width,
            top:top,
            bottom:top+gap,
            passed:false
        });
    }

    ctx.fillStyle="green";

    for(let p of pipes){
        ctx.fillRect(p.x,0,60,p.top);
        ctx.fillRect(p.x,p.bottom,60,canvas.height);

        p.x-=speed;

        if(
            bird.x<p.x+60 &&
            bird.x+bird.width>p.x &&
            (bird.y<p.top || bird.y+bird.height>p.bottom)
        ){
            gameOver();
        }

        if(!p.passed && p.x<bird.x){
            score++;
            coins++;
            p.passed=true;
        }
    }

    // COINS
    if(frame%120===0){
        coinsArr.push({
            x:canvas.width,
            y:Math.random()*canvas.height
        });
    }

    ctx.fillStyle="gold";

    for(let c of coinsArr){
        ctx.beginPath();
        ctx.arc(c.x,c.y,10,0,Math.PI*2);
        ctx.fill();

        c.x-=speed;

        if(
            bird.x<c.x+10 &&
            bird.x+bird.width>c.x &&
            bird.y<c.y+10 &&
            bird.y+bird.height>c.y
        ){
            coins+=5;
            c.x=-100;
        }
    }

    // LEVEL COMPLETE
    if(score >= levelTarget){
        levelComplete();
    }

    if(bird.y<0 || bird.y+bird.height>canvas.height){
        gameOver();
    }

    ctx.fillStyle="black";
    ctx.fillText("Score: "+score,10,20);
    ctx.fillText("Level: "+currentLevel,10,40);
    ctx.fillText("High: "+highScore,10,60);

    frame++;
    requestAnimationFrame(draw);
}

// LEVEL COMPLETE
function levelComplete(){
    gameRunning=false;

    if(currentLevel == unlockedLevel && unlockedLevel < 100){
        unlockedLevel++;
    }

    saveData();

    setTimeout(()=>{
        alert("Level " + currentLevel + " Complete!");
        startGame(currentLevel + 1);
    },300);
}

// GAME OVER
function gameOver(){
    gameRunning=false;

    if(score > highScore){
        highScore = score;
    }

    saveData();

    restartBtn.style.display="block";
    menu.style.display="block";
}

// RESTART
restartBtn.onclick=()=>{
    startGame(currentLevel);
}

// HOME
function goHome(){
    gameRunning=false;
    menu.style.display="block";
    restartBtn.style.display="none";
}
</script>

</body>
</html>
